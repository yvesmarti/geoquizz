<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Atlas — Quiz géographique</title>
<!-- ★ MOBILE : description pour Google, couleur de la barre du navigateur
     sur téléphone, et favicon (l'icône dans l'onglet) en SVG intégré -->
<meta name="description" content="Atlas : quiz géographique gratuit. Drapeaux, contours, capitales… Teste tes connaissances du monde en QCM ou en saisie libre.">
<meta name="theme-color" content="#0f1a2b">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'%3E%3Ccircle cx='20' cy='20' r='18' fill='%230f1a2b'/%3E%3Cpath d='M20 3 L23 20 L20 37 L17 20 Z' fill='%23e6b74d'/%3E%3Cpath d='M3 20 L20 17 L37 20 L20 23 Z' fill='%23e6b74d' opacity='.55'/%3E%3C/svg%3E">
<!-- ★ ÉCRAN D'ACCUEIL : le "manifest" décrit le site comme une appli
     (nom, icône, couleurs). Une fois ajouté à l'écran d'accueil du
     téléphone, Atlas s'ouvre en plein écran, sans barre d'adresse. -->
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="apple-touch-icon.png"><!-- icône pour iPhone/iPad -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ====================================================================
     TOKENS — toute l'identité visuelle est réglée ici (couleurs, etc.)
     Thème : « atlas de nuit ». Fond sombre pour faire ressortir les
     drapeaux, accent doré (boussole), méridiens en filigrane.
     ==================================================================== */
  :root{
    --bg:#0f1a2b; --panel:#17253c; --panel-2:#1e304c;
    --line:rgba(255,255,255,.09);
    --text:#eaf1f9; --muted:#8ea6c2;
    --gold:#e6b74d; --ok:#3fb68b; --ko:#e2604c;
    --radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    font-family:'Inter',system-ui,sans-serif;color:var(--text);background:var(--bg);
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:48px 48px;min-height:100vh;min-height:100dvh;line-height:1.55;-webkit-font-smoothing:antialiased;
    /* ★ MOBILE : 100dvh = hauteur réelle de l'écran sur téléphone,
       en tenant compte de la barre d'adresse qui apparaît/disparaît */
  }
  .display{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;line-height:1.05}

  .app{max-width:640px;margin:0 auto;padding:28px 20px 60px;min-height:100vh;display:flex;flex-direction:column}

  .top{display:flex;align-items:center;gap:12px;margin-bottom:36px}
  .rose{width:38px;height:38px;flex-shrink:0}
  .top b{font-family:'Bricolage Grotesque';font-size:20px;font-weight:800;letter-spacing:-.01em}
  .top span{font-size:12px;color:var(--muted);letter-spacing:.14em;text-transform:uppercase;display:block;margin-top:-2px}

  .screen{display:none;flex:1;flex-direction:column}
  .screen.active{display:flex}

  .btn{font-family:'Inter';font-size:16px;font-weight:600;cursor:pointer;border:none;border-radius:10px;
    padding:14px 22px;background:var(--gold);color:#241a03;transition:transform .12s,filter .12s}
  .btn:hover{filter:brightness(1.06)}
  .btn:active{transform:translateY(1px)}
  .btn.ghost{background:transparent;color:var(--text);border:1px solid var(--line)}
  .btn.ghost:hover{background:var(--panel-2);filter:none}

  /* ===== ACCUEIL ===== */
  .hero-h1{font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(30px,7vw,42px);letter-spacing:-.02em;margin-bottom:10px}
  .hero-h1 em{font-style:normal;color:var(--gold)}
  .hero-p{color:var(--muted);font-size:16px;margin-bottom:26px;max-width:440px}

  /* sélecteurs d'options (format, nombre de questions, continent) */
  .format{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap}
  .format .lbl{font-size:13px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;min-width:86px}
  .seg{display:inline-flex;background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:4px}
  .seg.wrap{flex-wrap:wrap}   /* ★ CONTINENT : autorise le retour à la ligne (6 boutons) */
  .seg button{font-family:'Inter';font-size:14px;font-weight:600;cursor:pointer;border:none;background:transparent;
    color:var(--muted);padding:8px 16px;border-radius:7px;transition:background .15s,color .15s}
  .seg button.on{background:var(--gold);color:#241a03}

  .modes{display:flex;flex-direction:column;gap:14px;margin-top:16px}
  .mode{display:flex;align-items:center;gap:18px;text-align:left;width:100%;background:var(--panel);
    border:1px solid var(--line);border-radius:var(--radius);padding:20px 22px;cursor:pointer;
    transition:border-color .15s,background .15s,transform .15s;font-family:'Inter';color:var(--text)}
  .mode:not(.soon):hover{background:var(--panel-2);border-color:var(--gold);transform:translateY(-2px)}
  .mode .emoji{font-size:30px;flex-shrink:0}
  .mode .m-txt{flex:1}
  .mode .m-txt b{font-family:'Bricolage Grotesque';font-size:18px;font-weight:700;display:block}
  .mode .m-txt small{color:var(--muted);font-size:14px}
  .mode .badge{font-size:11px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;padding:5px 10px;border-radius:20px}
  .badge.on{background:rgba(63,182,139,.15);color:var(--ok)}
  .badge.off{background:rgba(255,255,255,.06);color:var(--muted)}
  .mode.soon{opacity:.55;cursor:not-allowed}

  /* ===== QUIZ ===== */
  .quiz-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;gap:14px}
  .quiz-back{font-family:'Inter';font-size:13px;font-weight:600;cursor:pointer;border:1px solid var(--line);
    background:transparent;color:var(--muted);padding:8px 14px;border-radius:9px;flex-shrink:0;
    display:inline-flex;align-items:center;gap:6px;transition:background .15s,border-color .15s,color .15s}
  .quiz-back:hover{background:var(--panel-2);border-color:var(--gold);color:var(--text)}
  .score{font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;flex-shrink:0}
  .score b{color:var(--gold);font-size:20px}
  .dots{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--line)}
  .dot.done{background:var(--muted)}
  .dot.now{background:var(--gold);transform:scale(1.25)}
  /* ★ NB QUESTIONS : au-delà de 20 questions, les points sont remplacés par un compteur texte */
  .progress-txt{font-family:'Bricolage Grotesque';font-weight:700;font-size:15px;color:var(--muted)}
  .progress-txt b{color:var(--gold)}

  .flag-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:28px;text-align:center;margin-bottom:22px}
  .flag-card .q-label{font-size:13px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:18px}
  .flag-img{width:100%;max-width:300px;aspect-ratio:3/2;object-fit:cover;border-radius:8px;margin:0 auto;display:block;
    box-shadow:0 8px 30px rgba(0,0,0,.35);background:var(--panel-2)}
  .flag-img.contour-img{aspect-ratio:1/1;object-fit:contain;padding:14px;filter:invert(1) drop-shadow(0 8px 20px rgba(0,0,0,.45))}

  /* ★ CAPITALES / INVERSÉ : nom du pays affiché dans la carte de question */
  .pays-nom{font-family:'Bricolage Grotesque';font-weight:700;font-size:22px;margin-top:16px;display:none}
  .pays-nom.solo{margin-top:4px;font-size:clamp(26px,6vw,34px)}  /* ★ INVERSÉ : sans drapeau, le nom prend toute la place */

  /* réponses QCM */
  .answers{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
  .ans{font-family:'Inter';font-size:16px;font-weight:500;text-align:left;cursor:pointer;background:var(--panel);
    border:1px solid var(--line);border-radius:11px;padding:16px 18px;color:var(--text);transition:background .12s,border-color .12s}
  .ans:not(:disabled):hover{background:var(--panel-2);border-color:var(--muted)}
  .ans:disabled{cursor:default}
  .ans.correct{background:rgba(63,182,139,.16);border-color:var(--ok);color:#c7f2e1}
  .ans.wrong{background:rgba(226,96,76,.14);border-color:var(--ko);color:#f6cabf}

  /* ====================================================================
     ★ FEEDBACK : animations bonne / mauvaise réponse.
     @keyframes = décrit les étapes d'une animation (0% → 100%).
     La bonne réponse "rebondit", la mauvaise "tremble" (comme un
     mot de passe erroné), et un ✓ ou ✗ apparaît sur le bouton.
     ==================================================================== */
  @keyframes pop{0%{transform:scale(1)}35%{transform:scale(1.05)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(7px)}60%{transform:translateX(-5px)}80%{transform:translateX(3px)}}
  @keyframes fadein{from{opacity:0;transform:translateY(-50%) scale(.4)}to{opacity:1;transform:translateY(-50%) scale(1)}}
  .ans{position:relative}
  .ans.correct{animation:pop .4s ease}
  .ans.wrong{animation:shake .45s ease}
  .ans.correct::after,.ans.wrong::after{
    position:absolute;right:14px;top:50%;transform:translateY(-50%);
    font-size:19px;font-weight:700;animation:fadein .3s ease both .1s;
  }
  .ans.correct::after{content:"✓";color:var(--ok)}
  .ans.wrong::after{content:"✗";color:var(--ko)}
  /* mode inversé : le picto s'affiche en médaillon au centre du drapeau */
  .flag-ans.correct::after,.flag-ans.wrong::after{
    right:auto;left:50%;top:50%;margin-left:-22px;margin-top:-22px;transform:none;
    width:44px;height:44px;border-radius:50%;display:grid;place-items:center;
    font-size:24px;background:rgba(15,26,43,.88);
    animation:fadein-c .3s ease both .1s;
  }
  @keyframes fadein-c{from{opacity:0;scale:.4}to{opacity:1;scale:1}}
  /* le score rebondit en doré quand il augmente */
  .score b{display:inline-block}
  .score b.bump{animation:pop .4s ease}
  /* saisie libre : mêmes retours sur le champ et le verdict */
  .saisie input.wrong{border-color:var(--ko);animation:shake .45s ease}
  .saisie input.correct{border-color:var(--ok)}
  .saisie .verdict{animation:none}
  .saisie .verdict.ok,.saisie .verdict.ko{animation:fadein-c .3s ease both}
  /* ★ INVERSÉ : boutons de réponse contenant un drapeau au lieu d'un texte */
  .ans.flag-ans{padding:10px}
  .ans.flag-ans img{width:100%;aspect-ratio:3/2;object-fit:cover;border-radius:7px;display:block;background:var(--panel-2)}

  /* réponse SAISIE */
  .saisie{margin-bottom:20px}
  .saisie .row{display:flex;gap:10px}
  .saisie input{flex:1;font-family:'Inter';font-size:16px;background:var(--panel);border:1px solid var(--line);
    border-radius:11px;padding:15px 18px;color:var(--text)}
  .saisie input::placeholder{color:var(--muted)}
  .saisie input:disabled{opacity:.7}
  .saisie .verdict{margin-top:14px;font-size:15px;min-height:22px}
  .saisie .verdict.ok{color:var(--ok)}
  .saisie .verdict.ko{color:var(--ko)}
  .saisie .verdict b{color:var(--text)}

  .next-row{display:flex;justify-content:flex-end;min-height:52px;align-items:center}
  #nextBtn{display:none}

  /* ===== RÉSULTAT ===== */
  .result{text-align:center;margin-top:40px}
  .result .big{font-family:'Bricolage Grotesque';font-weight:800;font-size:clamp(48px,14vw,80px);color:var(--gold);line-height:1}
  .result .big small{font-size:.4em;color:var(--muted);font-weight:600}
  .result h2{font-family:'Bricolage Grotesque';font-size:24px;margin:16px 0 8px}
  .result p{color:var(--muted);margin-bottom:30px}
  .result .btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}

  /* ★ RÉCAP : liste des erreurs avec la correction, sous les boutons */
  .recap{margin-top:38px;text-align:left}
  .recap h3{font-family:'Bricolage Grotesque';font-size:15px;margin-bottom:14px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase}
  .err-item{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);
    border-radius:11px;padding:12px 14px;margin-bottom:10px}
  .err-item img{width:66px;aspect-ratio:3/2;object-fit:cover;border-radius:6px;flex-shrink:0;background:var(--panel-2)}
  .err-item img.contour-mini{aspect-ratio:1/1;object-fit:contain;padding:4px;filter:invert(1)}
  .err-item .txt b{display:block;font-family:'Bricolage Grotesque';font-size:16px}
  .err-item .txt small{color:var(--muted);font-size:13.5px}
  .err-item .txt small span{color:var(--ko)}

  /* ====================================================================
     ★ MOBILE : tout ce bloc ne s'applique qu'aux écrans étroits.
     Une "media query" = des règles CSS activées seulement sous une
     certaine largeur d'écran (ici 540px, puis 400px).
     ==================================================================== */
  @media(max-width:540px){
    .app{padding:18px 14px 40px}
    .top{margin-bottom:24px}
    /* réglages de l'accueil : le libellé passe au-dessus des boutons */
    .format{flex-direction:column;align-items:flex-start;gap:8px}
    .format .lbl{min-width:0}
    .seg{flex-wrap:wrap}                 /* les boutons peuvent aller à la ligne */
    .seg button{padding:8px 13px}
    .mode{padding:16px;gap:14px}
    .mode .emoji{font-size:26px}
    .flag-card{padding:20px 16px}
    .ans{padding:14px 15px}
    /* champ de saisie : le bouton Valider passe sous le champ si trop étroit */
    .saisie .row{flex-wrap:wrap}
    .saisie .row .btn{flex:1}
  }
  @media(max-width:400px){
    .answers{grid-template-columns:1fr}  /* réponses texte : 1 colonne, plus lisible */
  }
  /* …sauf en mode inversé : les drapeaux restent sur 2 colonnes, sinon
     ils deviennent énormes. :has() = "si le bloc contient un drapeau" */
  .answers:has(.flag-ans){grid-template-columns:1fr 1fr}

  /* ★ MOBILE : sur écran tactile (hover:none), on neutralise les effets
     de survol qui "collent" au doigt après un tap */
  @media(hover:none){
    .mode:not(.soon):hover{transform:none;border-color:var(--line);background:var(--panel)}
    .ans:not(:disabled):hover{background:var(--panel);border-color:var(--line)}
    .btn:hover{filter:none}
  }

  /* ====================================================================
     ★ ORDINATEUR : sur grand écran, le conteneur s'élargit pour
     mieux occuper l'espace disponible, et les modes de jeu passent
     en grille à deux colonnes sur l'accueil.
     ==================================================================== */
  @media(min-width:900px){
    .app{max-width:960px;padding:44px 32px 70px}
    .hero-p{max-width:640px}
    .modes{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .flag-card{padding:36px}
    .flag-img{max-width:360px}
  }
  @media(min-width:1300px){
    .app{max-width:1120px}
  }

  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
  :focus-visible{outline:2px solid var(--gold);outline-offset:2px}
</style>
</head>
<body>
<div class="app">

  <div class="top">
    <svg class="rose" viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="18" stroke="var(--gold)" stroke-width="1.2" opacity=".5"/>
      <path d="M20 3 L23 20 L20 37 L17 20 Z" fill="var(--gold)"/>
      <path d="M3 20 L20 17 L37 20 L20 23 Z" fill="var(--gold)" opacity=".55"/>
    </svg>
    <div><b>Atlas</b><span>Quiz géographique</span></div>
  </div>

  <!-- ============ ÉCRAN 1 : ACCUEIL ============ -->
  <section class="screen active" id="screen-home">
    <h1 class="hero-h1">Reconnais-tu<br>le monde&nbsp;? <em>▸</em></h1>
    <p class="hero-p">Drapeaux, contours, capitales et mode inversé sont jouables, les hymnes arrivent bientôt.</p>

    <div class="format">
      <span class="lbl">Réponses</span>
      <div class="seg" id="segFormat">
        <button class="on" data-format="qcm" onclick="choisirFormat('qcm')">QCM à 4 choix</button>
        <button data-format="saisie" onclick="choisirFormat('saisie')">Saisie libre</button>
      </div>
    </div>

    <!-- ★ NB QUESTIONS : longueur de la partie -->
    <div class="format">
      <span class="lbl">Questions</span>
      <div class="seg" id="segNb">
        <button class="on" data-nb="10" onclick="choisirNb(10)">10</button>
        <button data-nb="20" onclick="choisirNb(20)">20</button>
        <button data-nb="50" onclick="choisirNb(50)">50</button>
      </div>
    </div>

    <!-- ★ CONTINENT : filtre facultatif, « Monde » par défaut -->
    <div class="format">
      <span class="lbl">Continent</span>
      <div class="seg wrap" id="segContinent">
        <button class="on" data-cont="monde" onclick="choisirContinent('monde')">🌍 Monde</button>
        <button data-cont="Europe" onclick="choisirContinent('Europe')">Europe</button>
        <button data-cont="Asie" onclick="choisirContinent('Asie')">Asie</button>
        <button data-cont="Afrique" onclick="choisirContinent('Afrique')">Afrique</button>
        <button data-cont="Amériques" onclick="choisirContinent('Amériques')">Amériques</button>
        <button data-cont="Océanie" onclick="choisirContinent('Océanie')">Océanie</button>
      </div>
    </div>

    <div class="modes">
      <button class="mode" onclick="startQuiz('drapeaux')">
        <span class="emoji">🚩</span>
        <span class="m-txt"><b>Drapeaux</b><small>Devine le pays d'après son drapeau</small></span>
        <span class="badge on">Jouable</span>
      </button>
      <!-- ★ INVERSÉ : nouvelle carte de mode (toujours en QCM : on clique sur un drapeau) -->
      <button class="mode" onclick="startQuiz('inverse')">
        <span class="emoji">🎯</span>
        <span class="m-txt"><b>Drapeaux inversés</b><small>Trouve le drapeau du pays nommé (QCM uniquement)</small></span>
        <span class="badge on">Jouable</span>
      </button>
      <button class="mode" onclick="startQuiz('contours')">
        <span class="emoji">🗺️</span>
        <span class="m-txt"><b>Contours</b><small>Devine le pays d'après sa forme</small></span>
        <span class="badge on">Jouable</span>
      </button>
      <button class="mode" onclick="startQuiz('capitales')">
        <span class="emoji">🏛️</span>
        <span class="m-txt"><b>Capitales</b><small>Trouve la capitale du pays affiché</small></span>
        <span class="badge on">Jouable</span>
      </button>
      <button class="mode soon" disabled>
        <span class="emoji">🎵</span>
        <span class="m-txt"><b>Hymnes</b><small>Devine le pays d'après son hymne</small></span>
        <span class="badge off">Bientôt</span>
      </button>
    </div>
  </section>

  <!-- ============ ÉCRAN 2 : QUIZ ============ -->
  <section class="screen" id="screen-quiz">
    <div class="quiz-head">
      <button class="quiz-back" onclick="quitQuiz()" aria-label="Revenir au menu">← Menu</button>
      <div class="score">Score <b id="scoreVal">0</b></div>
      <div class="dots" id="dots"></div>
    </div>

    <div class="flag-card">
      <div class="q-label" id="qLabel">Quel est ce pays&nbsp;?</div>
      <img class="flag-img" id="flagImg" alt="Drapeau à identifier">
      <div class="pays-nom" id="paysNom"></div>
    </div>

    <!-- mode QCM -->
    <div class="answers" id="answers"></div>

    <!-- mode SAISIE -->
    <div class="saisie" id="saisie" style="display:none">
      <div class="row">
        <input id="saisieInput" type="text" autocomplete="off" placeholder="Écris le nom du pays…">
        <button class="btn" id="validerBtn" onclick="validerSaisie()">Valider</button>
      </div>
      <div class="verdict" id="verdict"></div>
    </div>

    <div class="next-row">
      <button class="btn" id="nextBtn" onclick="nextQuestion()">Suivant →</button>
    </div>
  </section>

  <!-- ============ ÉCRAN 3 : RÉSULTAT ============ -->
  <section class="screen" id="screen-result">
    <div class="result">
      <div class="big"><span id="finalScore">0</span><small>/<span id="finalTotal">10</span></small></div>
      <h2 id="resultTitle">Bien joué&nbsp;!</h2>
      <p id="resultMsg"></p>
      <!-- ★ RECORD : meilleur score enregistré dans le navigateur -->
      <p id="recordMsg" style="margin-top:-18px;font-size:14px"></p>
      <div class="btns">
        <button class="btn" onclick="startQuiz(modeActuel)">Rejouer</button>
        <button class="btn ghost" onclick="goHome()">Menu</button>
      </div>
      <!-- ★ RÉCAP : les erreurs de la partie, avec la correction -->
      <div class="recap" id="recap"></div>
    </div>
  </section>

</div>

<script>
/* =====================================================================
   1) LES DONNÉES  —  une ligne = un pays. Ajouter un pays = ajouter
   une ligne. "code" = code ISO à 2 lettres, en minuscules.
   "cap" = capitale ; "capAlt" (facultatif) = autres réponses acceptées
   en mode Saisie (ex. "La Haye" pour les Pays-Bas).
   ===================================================================== */
const PAYS = [
  {code:"fr", nom:"France",          continent:"Europe", cap:"Paris"},

// pays sans fichier dans contours/ : exclus uniquement du quiz Contours
const PAYS_SANS_CONTOUR = ['fm','mh','ps','tv','xk'];
const PAYS_CONTOURS = PAYS.filter(p => !PAYS_SANS_CONTOUR.includes(p.code));

/* =====================================================================
   2) OÙ TROUVER LE DRAPEAU / LE CONTOUR
   On cherche D'ABORD ton fichier local (dossier "drapeaux"). Si le
   fichier n'existe pas encore, on bascule automatiquement sur l'image
   en ligne (voir la fonction poserQuestion, plus bas). Les contours
   n'ont pas de secours en ligne : PAYS_CONTOURS ne contient que les
   pays pour lesquels le fichier existe déjà.
   ===================================================================== */
function flagUrlLocal(code){ return `drapeaux/${code.toUpperCase()}.svg`; } // TES fichiers
function flagUrlSecours(code){ return `https://flagcdn.com/w320/${code}.png`; } // secours en ligne
function contourUrlLocal(code){ return `contours/${code}.svg`; }

/* =====================================================================
   3) LE MOTEUR DE JEU
   ===================================================================== */
let nbQuestions = 10;        // ★ NB QUESTIONS : choisi sur l'accueil (10/20/50)
let continentActuel = 'monde'; // ★ CONTINENT : 'monde' = pas de filtre
let partie = [];
let index = 0;
let score = 0;
let erreurs = [];            // ★ RÉCAP : les questions ratées de la partie en cours
let format = 'qcm';          // 'qcm' ou 'saisie'
let repondu = false;         // évite de valider deux fois la même question
let modeActuel = 'drapeaux'; // 'drapeaux', 'inverse', 'contours' ou 'capitales'
let dotsEnTexte = false;     // ★ NB QUESTIONS : au-delà de 20, compteur texte au lieu des points

// mélange un tableau
function melange(tab){
  const t = [...tab];
  for(let i = t.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [t[i], t[j]] = [t[j], t[i]];
  }
  return t;
}

// enlève accents/majuscules/tirets pour comparer les saisies
function normaliser(s){
  return s.toLowerCase().trim()
    .normalize('NFD').replace(/[\u0300-\u036f]/g,'') // enlève les accents
    .replace(/[^a-z0-9]/g,'');                        // enlève espaces, tirets, apostrophes
}

/* Le texte attendu/affiché selon le mode :
   capitale en mode Capitales, nom du pays partout ailleurs */
function libelleReponse(pays){
  return modeActuel === 'capitales' ? pays.cap : pays.nom;
}
function bonneSaisie(valeur, bonPays){
  const v = normaliser(valeur);
  if(v === normaliser(libelleReponse(bonPays))) return true;
  if(modeActuel === 'capitales' && bonPays.capAlt){
    return bonPays.capAlt.some(alt => v === normaliser(alt));
  }
  return false;
}

/* ---- réglages de l'accueil ---- */
function choisirFormat(f){
  format = f;
  document.querySelectorAll('#segFormat button').forEach(b => {
    b.classList.toggle('on', b.dataset.format === f);
  });
}
/* ★ NB QUESTIONS */
function choisirNb(n){
  nbQuestions = n;
  document.querySelectorAll('#segNb button').forEach(b => {
    b.classList.toggle('on', +b.dataset.nb === n);
  });
}
/* ★ CONTINENT */
function choisirContinent(c){
  continentActuel = c;
  document.querySelectorAll('#segContinent button').forEach(b => {
    b.classList.toggle('on', b.dataset.cont === c);
  });
}

function afficherEcran(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function startQuiz(mode){
  modeActuel = mode;
  // pool de base selon le mode (le mode inversé pioche dans tous les pays,
  // comme Drapeaux et Capitales, grâce au secours en ligne des drapeaux)
  let pool = mode === 'contours' ? PAYS_CONTOURS : PAYS;
  // ★ CONTINENT : filtre facultatif
  if(continentActuel !== 'monde') pool = pool.filter(p => p.continent === continentActuel);
  // ★ NB QUESTIONS : si le pool est plus petit que demandé (ex. Océanie en 50
  // questions), la partie fait simplement la taille du pool
  partie = melange(pool).slice(0, nbQuestions);
  index = 0; score = 0;
  erreurs = [];   // ★ RÉCAP
  document.getElementById('scoreVal').textContent = 0;
  construireDots();
  afficherEcran('screen-quiz');
  poserQuestion();
}

function construireDots(){
  const box = document.getElementById('dots');
  box.innerHTML = '';
  dotsEnTexte = partie.length > 20;   // ★ NB QUESTIONS
  if(dotsEnTexte){
    const s = document.createElement('span');
    s.className = 'progress-txt'; s.id = 'progressTxt';
    box.appendChild(s);
    return;
  }
  for(let i = 0; i < partie.length; i++){
    const d = document.createElement('span'); d.className = 'dot'; box.appendChild(d);
  }
}
function majDots(){
  if(dotsEnTexte){   // ★ NB QUESTIONS : compteur "7 / 50"
    document.getElementById('progressTxt').innerHTML = '<b>' + (index + 1) + '</b> / ' + partie.length;
    return;
  }
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.className = 'dot' + (i < index ? ' done' : i === index ? ' now' : '');
  });
}

function poserQuestion(){
  const bonPays = partie[index];
  repondu = false;
  majDots();

  const img = document.getElementById('flagImg');
  const label = document.getElementById('qLabel');
  const nomEl = document.getElementById('paysNom');
  img.classList.toggle('contour-img', modeActuel === 'contours');
  img.style.display = 'block';
  nomEl.classList.remove('solo');

  if(modeActuel === 'contours'){
    label.textContent = 'Quel est ce pays ?';
    nomEl.style.display = 'none';
    img.onerror = null;
    img.alt = 'Silhouette du pays à identifier';
    img.src = contourUrlLocal(bonPays.code);

  } else if(modeActuel === 'capitales'){
    label.textContent = 'Quelle est la capitale de ce pays ?';
    nomEl.style.display = 'block';
    nomEl.textContent = bonPays.nom;
    img.onerror = () => { img.onerror = null; img.src = flagUrlSecours(bonPays.code); };
    img.alt = 'Drapeau : ' + bonPays.nom;
    img.src = flagUrlLocal(bonPays.code);

  } else if(modeActuel === 'inverse'){
    /* ★ INVERSÉ : pas d'image dans la carte, juste le nom du pays.
       Les drapeaux sont dans les boutons de réponse. */
    label.textContent = 'Quel est le drapeau de ce pays ?';
    img.style.display = 'none';
    nomEl.style.display = 'block';
    nomEl.classList.add('solo');
    nomEl.textContent = bonPays.nom;

  } else {
    label.textContent = 'Quel est ce pays ?';
    nomEl.style.display = 'none';
    img.onerror = () => { img.onerror = null; img.src = flagUrlSecours(bonPays.code); };
    img.alt = 'Drapeau à identifier';
    img.src = flagUrlLocal(bonPays.code);
  }

  document.getElementById('nextBtn').style.display = 'none';

  /* ★ FLUIDITÉ : on télécharge discrètement l'image de la question
     SUIVANTE pendant que le joueur réfléchit. Résultat : plus de temps
     de chargement visible entre deux questions (utile en 4G). */
  const suivant = partie[index + 1];
  if(suivant){
    const pre = new Image();
    if(modeActuel === 'contours'){
      pre.src = contourUrlLocal(suivant.code);
    } else {
      pre.onerror = () => { pre.onerror = null; pre.src = flagUrlSecours(suivant.code); };
      pre.src = flagUrlLocal(suivant.code);
    }
  }

  /* ★ INVERSÉ : ce mode est toujours en QCM (on clique sur un drapeau),
     quel que soit le format choisi à l'accueil */
  if(modeActuel === 'inverse') poserQCM(bonPays);
  else if(format === 'qcm') poserQCM(bonPays);
  else poserSaisie(bonPays);
}

/* ---- mode QCM (textes OU drapeaux selon le mode) ---- */
function poserQCM(bonPays){
  document.getElementById('answers').style.display = 'grid';
  document.getElementById('saisie').style.display = 'none';

  const memeContinent = PAYS.filter(p => p.continent === bonPays.continent && p.code !== bonPays.code);
  let leurres = melange(memeContinent).slice(0, 3);
  if(leurres.length < 3){
    const autres = melange(PAYS.filter(p => p.code !== bonPays.code && !leurres.includes(p)));
    leurres = leurres.concat(autres).slice(0, 3);
  }
  const choix = melange([bonPays, ...leurres]);

  const box = document.getElementById('answers');
  box.innerHTML = '';
  choix.forEach(pays => {
    const b = document.createElement('button');
    b.dataset.code = pays.code;   // repère fiable pour retrouver la bonne réponse
    if(modeActuel === 'inverse'){
      /* ★ INVERSÉ : le bouton contient un drapeau */
      b.className = 'ans flag-ans';
      const im = document.createElement('img');
      im.alt = 'Drapeau proposé';
      im.onerror = () => { im.onerror = null; im.src = flagUrlSecours(pays.code); };
      im.src = flagUrlLocal(pays.code);
      b.appendChild(im);
    } else {
      b.className = 'ans';
      b.textContent = libelleReponse(pays);   // nom du pays OU sa capitale
    }
    b.onclick = () => repondreQCM(b, pays, bonPays);
    box.appendChild(b);
  });
}
function repondreQCM(bouton, choisi, bonPays){
  if(repondu) return;
  repondu = true;
  document.querySelectorAll('.ans').forEach(b => {
    b.disabled = true;
    if(b.dataset.code === bonPays.code) b.classList.add('correct');
  });
  if(choisi.code === bonPays.code){
    score++;
    bumpScore();   // ★ FEEDBACK : petit rebond du compteur de score
  } else {
    bouton.classList.add('wrong');
    /* ★ RÉCAP : on note l'erreur (le pays + ce que le joueur a répondu) */
    erreurs.push({pays: bonPays, donnee: choisi.nom});
  }
  montrerSuivant();
}

/* ★ FEEDBACK : met à jour le score avec un rebond. L'astuce
   "void offsetWidth" force le navigateur à redémarrer l'animation
   même si la classe était déjà présente. */
function bumpScore(){
  const sv = document.getElementById('scoreVal');
  sv.textContent = score;
  sv.classList.remove('bump');
  void sv.offsetWidth;
  sv.classList.add('bump');
}

/* ---- mode SAISIE ---- */
function poserSaisie(bonPays){
  document.getElementById('answers').style.display = 'none';
  document.getElementById('saisie').style.display = 'block';

  const input = document.getElementById('saisieInput');
  const verdict = document.getElementById('verdict');
  input.value = '';
  input.disabled = false;
  input.classList.remove('correct','wrong');   // ★ FEEDBACK : on repart propre
  input.placeholder = modeActuel === 'capitales' ? 'Écris le nom de la capitale…' : 'Écris le nom du pays…';
  verdict.textContent = '';
  verdict.className = 'verdict';
  document.getElementById('validerBtn').disabled = false;

  input.onkeydown = (e) => { if(e.key === 'Enter') validerSaisie(); };
  input.focus();
}
function validerSaisie(){
  if(repondu) return;
  const bonPays = partie[index];
  const input = document.getElementById('saisieInput');
  const verdict = document.getElementById('verdict');
  if(input.value.trim() === '') return; // rien tapé : on ne valide pas

  repondu = true;
  input.disabled = true;
  document.getElementById('validerBtn').disabled = true;

  if(bonneSaisie(input.value, bonPays)){
    score++;
    bumpScore();                        // ★ FEEDBACK : rebond du score
    input.classList.add('correct');     // bordure verte sur le champ
    verdict.className = 'verdict ok';
    verdict.textContent = '✓ Correct !';
  } else {
    input.classList.add('wrong');       // ★ FEEDBACK : le champ tremble en rouge
    verdict.className = 'verdict ko';
    verdict.innerHTML = '✗ Raté. C\'était <b>' + libelleReponse(bonPays) + '</b>.';
    /* ★ RÉCAP : on note l'erreur avec la saisie du joueur */
    erreurs.push({pays: bonPays, donnee: input.value.trim()});
  }
  montrerSuivant();
}

/* ---- commun aux deux modes ---- */
function montrerSuivant(){
  const btn = document.getElementById('nextBtn');
  btn.style.display = 'inline-block';
  btn.focus();
}
function nextQuestion(){
  index++;
  if(index < partie.length) poserQuestion();
  else afficherResultat();
}

function afficherResultat(){
  document.getElementById('finalScore').textContent = score;
  document.getElementById('finalTotal').textContent = partie.length;
  const ratio = score / partie.length;
  let titre, msg;
  if(ratio === 1){ titre = "Sans-faute&nbsp;! 🌍"; msg = "Un vrai géographe. Chapeau."; }
  else if(ratio >= .7){ titre = "Beau parcours&nbsp;!"; msg = "Tu maîtrises la carte du monde."; }
  else if(ratio >= .4){ titre = "Pas mal&nbsp;!"; msg = "Encore quelques tours et ce sera parfait."; }
  else { titre = "En route&nbsp;!"; msg = "Le monde est vaste, rejoue pour progresser."; }
  document.getElementById('resultTitle').innerHTML = titre;
  document.getElementById('resultMsg').textContent = msg;

  /* ★ RECORD : localStorage = petite mémoire du navigateur qui survit
     à la fermeture de la page. On garde le meilleur pourcentage par mode. */
  const pct = Math.round(ratio * 100);
  const cle = 'atlas-record-' + modeActuel;
  const ancien = +(localStorage.getItem(cle) || 0);
  const recEl = document.getElementById('recordMsg');
  if(pct > ancien){
    localStorage.setItem(cle, pct);
    recEl.textContent = '🏆 Nouveau record : ' + pct + ' % de bonnes réponses !';
    recEl.style.color = 'var(--gold)';
  } else {
    recEl.textContent = 'Ton record dans ce mode : ' + ancien + ' %';
    recEl.style.color = 'var(--muted)';
  }

  construireRecap();   // ★ RÉCAP
  afficherEcran('screen-result');
}

/* ★ RÉCAP : construit la liste des erreurs avec la correction.
   Chaque ligne : vignette (drapeau ou contour) + bonne réponse
   + ce que le joueur avait répondu. Rien ne s'affiche en cas
   de sans-faute. */
function construireRecap(){
  const box = document.getElementById('recap');
  box.innerHTML = '';
  if(erreurs.length === 0) return;

  const h = document.createElement('h3');
  h.textContent = 'À retenir (' + erreurs.length + ')';
  box.appendChild(h);

  erreurs.forEach(e => {
    const item = document.createElement('div');
    item.className = 'err-item';

    // vignette : contour en mode Contours, drapeau partout ailleurs
    const im = document.createElement('img');
    if(modeActuel === 'contours'){
      im.className = 'contour-mini';
      im.src = contourUrlLocal(e.pays.code);
    } else {
      im.onerror = () => { im.onerror = null; im.src = flagUrlSecours(e.pays.code); };
      im.src = flagUrlLocal(e.pays.code);
    }
    im.alt = 'Drapeau : ' + e.pays.nom;

    // texte : bonne réponse en gras, réponse donnée en dessous
    const txt = document.createElement('div');
    txt.className = 'txt';
    const bonne = document.createElement('b');
    bonne.textContent = modeActuel === 'capitales'
      ? e.pays.nom + ' → ' + e.pays.cap
      : e.pays.nom;
    const detail = document.createElement('small');
    detail.innerHTML = 'Ta réponse : <span></span>';
    detail.querySelector('span').textContent = e.donnee;
    txt.appendChild(bonne);
    txt.appendChild(detail);

    item.appendChild(im);
    item.appendChild(txt);
    box.appendChild(item);
  });
}

function goHome(){ afficherEcran('screen-home'); }

/* ★ QUITTER : retour au menu en plein milieu d'une partie, avec
   confirmation pour éviter de perdre sa progression par erreur */
function quitQuiz(){
  if(confirm('Quitter la partie en cours et revenir au menu ?')) goHome();
}

/* ★ CLAVIER : sur ordinateur, les touches 1 à 4 répondent au QCM.
   Sans effet sur téléphone, et ignoré pendant la saisie libre. */
document.addEventListener('keydown', (e) => {
  if(!document.getElementById('screen-quiz').classList.contains('active')) return;
  if(repondu || document.activeElement.tagName === 'INPUT') return;
  const n = ['1','2','3','4'].indexOf(e.key);
  if(n === -1) return;
  const boutons = document.querySelectorAll('#answers .ans');
  if(boutons[n]) boutons[n].click();
});
</script>
